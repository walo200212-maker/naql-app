name: wasl_app
description: WaslApp (وصل) — Truck moving marketplace for Morocco
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  firebase_messaging: ^15.0.4

  # Google Maps & Location
  google_maps_flutter: ^2.7.0
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  geoflutterfire_plus: ^0.0.22

  # State Management
  provider: ^6.1.2

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  smooth_page_indicator: ^1.1.0
  pin_code_fields: ^8.0.1
  image_picker: ^1.1.2
  percent_indicator: ^4.2.3
  badges: ^3.1.2
  flutter_rating_bar: ^4.0.1
  dotted_border: ^2.1.0
  animations: ^2.0.11

  # Navigation
  go_router: ^14.2.7

  # Social Auth
  google_sign_in: ^6.2.1

  # Utils
  intl: ^0.20.2
  url_launcher: ^6.3.0
  share_plus: ^10.0.2
  package_info_plus: ^8.0.2
  flutter_local_notifications: ^17.2.3
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5
  http: ^1.2.2
  uuid: ^4.4.2
  timeago: ^3.7.0
  shared_preferences: ^2.3.2

  # Chat / Support (Tawk.to via WebView)
  webview_flutter: ^4.8.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
